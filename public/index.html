<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Email Campaigner</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div id="app">
    <aside class="sidebar">
      <div class="brand"><span class="brand-mark">✈</span><span>Campaigner</span></div>
      <nav>
        <a data-view="dashboard" class="active"><span class="nav-icon">▦</span>Dashboard</a>
        <a data-view="contacts"><span class="nav-icon">♙</span>Contacts</a>
        <div id="verticalNav" class="subnav"></div>
        <a data-view="scrape"><span class="nav-icon">⌕</span>Find Leads</a>
        <a data-view="templates"><span class="nav-icon">✎</span>Templates</a>
        <a data-view="testEmail"><span class="nav-icon">✉</span>Test Email</a>
        <a data-view="campaigns"><span class="nav-icon">↗</span>Campaigns</a>
        <a data-view="tracking"><span class="nav-icon">◎</span>Tracking</a>
        <a data-view="settings"><span class="nav-icon">⚙</span>Settings</a>
      </nav>
      <div class="mode-pill" id="modePill">checking…</div>
      <div id="userBox" style="margin-top:10px;padding:0 4px"></div>
    </aside>

    <main id="main">
      <div class="loading">Loading…</div>
    </main>
  </div>

  <div id="toast" class="toast"></div>
  <div id="modal" class="modal-backdrop hidden"><div class="modal" id="modalBox"></div></div>

  <script src="/app.js" type="module"></script>
</body>
</html>

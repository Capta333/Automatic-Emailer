<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in · Email Campaigner</title>
  <style>
    :root{--bg:#0f1117;--panel:#181b24;--panel-2:#1f232e;--border:#2a2f3c;--text:#e7e9ee;--muted:#8a91a3;--accent:#6c8cff;--accent-2:#4f6ef0;--red:#f87171;--radius:12px}
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:Arial,Helvetica,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center}
    .box{width:360px;max-width:92vw;background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);padding:28px}
    .brand{font-size:20px;font-weight:700;margin-bottom:4px}
    .brand span{color:var(--accent)}
    p.sub{color:var(--muted);margin:0 0 20px;font-size:14px}
    label{display:block;font-size:13px;color:var(--muted);margin:14px 0 6px}
    input{width:100%;background:var(--panel-2);border:1px solid var(--border);color:var(--text);padding:10px 12px;border-radius:8px;font-size:14px}
    input:focus{outline:none;border-color:var(--accent)}
    button{width:100%;margin-top:20px;background:var(--accent-2);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer}
    button:hover{background:var(--accent)}
    button:disabled{opacity:.6;cursor:default}
    .err{background:rgba(248,113,113,.12);border:1px solid var(--red);color:#fecaca;padding:10px 12px;border-radius:8px;font-size:13px;margin-top:16px;display:none}
    .hint{color:var(--muted);font-size:12px;margin-top:14px;text-align:center}
    .switch{color:var(--muted);font-size:13px;margin-top:16px;text-align:center}
    .switch a{color:var(--accent);cursor:pointer;text-decoration:none;font-weight:700}
  </style>
</head>
<body>
  <div class="box">
    <div class="brand">✉️ <span>Campaigner</span></div>
    <p class="sub" id="sub">Sign in to continue.</p>
    <form id="form" autocomplete="on">
      <div id="nameRow" style="display:none">
        <label for="name">Your name</label>
        <input id="name" name="name" placeholder="Jane Doe" />
      </div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="username" placeholder="you@company.com" required />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" placeholder="••••••••" required />
      <div class="err" id="err"></div>
      <button id="submit" type="submit">Sign in</button>
    </form>
    <p class="switch" id="signupSwitch">Need access? <a id="modeLink">Create an account</a></p>
    <p class="hint" id="setupHint" style="display:none">No accounts yet — create the first admin to get started.</p>
  </div>

  <script>
    const $ = (s) => document.querySelector(s);
    let mode = 'login'; // 'login' | 'setup' | 'signup'

    function showErr(m) { const e = $('#err'); e.textContent = m; e.style.display = m ? 'block' : 'none'; }
    function setMode(next) {
      mode = next;
      showErr('');
      const creating = mode === 'setup' || mode === 'signup';
      $('#nameRow').style.display = creating ? 'block' : 'none';
      $('#password').setAttribute('autocomplete', creating ? 'new-password' : 'current-password');
      $('#sub').textContent = mode === 'setup'
        ? 'Welcome — set up your admin account.'
        : mode === 'signup'
          ? 'Create your account to continue.'
          : 'Sign in to continue.';
      $('#submit').textContent = mode === 'setup'
        ? 'Create admin & continue'
        : mode === 'signup'
          ? 'Create account'
          : 'Sign in';
      $('#signupSwitch').style.display = mode === 'setup' ? 'none' : 'block';
      $('#modeLink').textContent = mode === 'signup' ? 'Sign in instead' : 'Create an account';
    }

    async function init() {
      try {
        const me = await fetch('/api/auth/me').then((r) => r.json());
        if (me.authDisabled || me.user) { location.href = '/'; return; } // already in
        if (me.needsSetup) {
          setMode('setup');
          $('#setupHint').style.display = 'block';
        }
      } catch {}
    }

    $('#modeLink').addEventListener('click', () => setMode(mode === 'signup' ? 'login' : 'signup'));

    $('#form').addEventListener('submit', async (e) => {
      e.preventDefault();
      showErr('');
      const btn = $('#submit'); btn.disabled = true;
      const body = { email: $('#email').value.trim(), password: $('#password').value };
      if (mode === 'setup' || mode === 'signup') body.name = $('#name').value.trim();
      try {
        const path = mode === 'setup' ? '/api/auth/setup' : mode === 'signup' ? '/api/auth/signup' : '/api/auth/login';
        const res = await fetch(path, {
          method: 'POST', headers: { 'content-type': 'application/json' }, body: JSON.stringify(body),
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || 'Something went wrong');
        location.href = '/';
      } catch (err) {
        showErr(err.message); btn.disabled = false;
      }
    });

    init();
  </script>
</body>
</html>

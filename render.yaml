services:
  - type: web
    name: email-campaigner
    runtime: node
    plan: starter
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /api/health
    autoDeploy: true
    disk:
      name: campaigner-data
      mountPath: /var/data/email-campaigner
      sizeGB: 1
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: DATA_DIR
        value: /var/data/email-campaigner
      - key: DRY_RUN
        value: true
      - key: SEND_SPACING_SECONDS
        value: 45
      - key: SEND_JITTER_SECONDS
        value: 15
      - key: PUBLIC_BASE_URL
        sync: false
      - key: SENDER_NAME
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: SENDER_ADDRESS
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: 587
      - key: SMTP_SECURE
        value: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: AI_PROVIDER
        value: claude
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: CLAUDE_MODEL
        value: claude-opus-4-8
      - key: MAKE_WEBHOOK_URL
        sync: false
      - key: MAKE_INBOUND_SECRET
        sync: false
